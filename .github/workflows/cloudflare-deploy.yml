name: Cloudflare Pages Deploy

on:
  push:
    branches:
      - master
    paths:
      - 'data/**'
      - 'images/**'
      - 'posts/**'
      - 'spec/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Cloudflare Pages Deploy Hook
        run: |
          curl -X POST ${{ secrets.CF_DEPLOY_HOOK }}
