name: 上传文章图片至 Cloudflare R2

on:
  workflow_dispatch:
    inputs:
      payload:
        description: Pages CMS payload as JSON
        required: true
        type: string

jobs:
  upload:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # 允许 commit 回写替换后的文件

    steps:
      - name: 解析文章路径
        id: parse
        run: |
          FILE_PATH=$(echo '${{ inputs.payload }}' | jq -r '.context.path')
          echo "file_path=$FILE_PATH" >> $GITHUB_OUTPUT
          echo "✅ 文章路径: $FILE_PATH"

      - name: Checkout 仓库
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装依赖
        run: npm install
        working-directory: .github/scripts

      - name: 执行图片上传脚本
        env:
          FILE_PATH: ${{ steps.parse.outputs.file_path }}
          R2_ENDPOINT:          ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET:            ${{ secrets.R2_BUCKET }}
          R2_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_PUBLIC_URL:        ${{ secrets.R2_PUBLIC_URL }}
          R2_PATH_PREFIX:       ${{ secrets.R2_PATH_PREFIX }}
        # 在 scripts 目录下运行，node_modules 就在同级，import 可正常解析
        run: node upload-images-to-r2.mjs
        working-directory: .github/scripts

      - name: Commit 替换结果
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "ℹ️ 无变更，无需 commit"
          else
            git commit -m "chore(images): 上传图片至 R2 [$(basename '${{ steps.parse.outputs.file_path }}')]"
            git push
          fi
